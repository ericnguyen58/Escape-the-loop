<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>One Minute World</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Screen 1: Location -->
  <div id="screen-location" class="screen active">
    <p class="app-name">One Minute World</p>
    <h1 class="heading">Where are you<br>right now?</h1>
    <div class="location-grid">
      <button class="location-btn" data-location="room">My room</button>
      <button class="location-btn" data-location="cafe">Café</button>
      <button class="location-btn" data-location="library">Library</button>
      <button class="location-btn" data-location="outside">Outside</button>
      <button class="location-btn" data-location="office">Class / office</button>
      <button class="location-btn" data-location="transit">Transit</button>
    </div>
    <button id="btn-surprise" class="surprise-btn">Surprise me</button>
  </div>

  <!-- Screen 2: Task -->
  <div id="screen-task" class="screen">
    <div class="task-header">
      <span id="location-badge" class="location-badge"></span>
      <button id="btn-close" class="close-btn" aria-label="Start over">&#215;</button>
    </div>
    <div class="task-body">
      <p id="task-text" class="task-text"></p>
    </div>

    <!-- Visual task: camera button + hint -->
    <div id="task-visual" class="task-type-ui hidden">
      <button class="btn-camera" id="btn-open-camera">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1a18" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>open camera</span>
      </button>
      <input type="file" id="camera-input" accept="image/*" capture="environment">
      <p class="camera-hint">stays inside the app</p>
    </div>

    <!-- Reflect task: textarea -->
    <div id="task-reflect" class="task-type-ui hidden">
      <textarea id="reflect-input" class="reflect-textarea" placeholder="whatever comes to mind."></textarea>
    </div>

    <!-- Done button — always present -->
    <div class="task-done-wrap">
      <button id="btn-done" class="btn-done">I'm done</button>
    </div>

    <div id="photo-preview" class="photo-preview hidden">
      <img id="photo-img" src="" alt="">
    </div>
  </div>

  <!-- Screen 3: Done -->
  <div id="screen-done" class="screen">
    <div class="done-body">
      <p class="done-title">One minute done.</p>
      <p id="closing-text" class="closing-text"></p>
    </div>
  </div>

  <!-- Screen: In-app camera (State 2) -->
  <div id="screen-camera" class="cam-screen">
    <video id="camera-video" autoplay muted playsinline></video>
    <canvas id="camera-canvas"></canvas>
    <div class="cam-viewfinder"></div>
    <div class="cam-bracket cam-bracket--tl"></div>
    <div class="cam-bracket cam-bracket--tr"></div>
    <div class="cam-bracket cam-bracket--bl"></div>
    <div class="cam-bracket cam-bracket--br"></div>
    <span id="cam-time-badge" class="cam-time-badge"></span>
    <p id="cam-task-text" class="cam-task-text"></p>
    <div class="cam-bar">
      <button id="btn-cam-cancel" class="cam-bar-action">cancel</button>
      <button id="btn-shutter" class="cam-shutter" aria-label="Take photo">
        <span class="cam-shutter-inner"></span>
      </button>
      <button id="btn-cam-flip" class="cam-bar-action">flip</button>
    </div>
  </div>

  <!-- Screen: After photo (State 3) -->
  <div id="screen-after" class="after-screen">
    <img id="after-photo-img" class="after-photo-img" src="" alt="">
    <div class="after-strip">
      <p id="after-task-text" class="after-task-text"></p>
      <p id="after-timestamp" class="after-timestamp"></p>
      <button id="btn-save-photo" class="btn-save-photo">save to device</button>
      <div class="after-actions">
        <button id="btn-retake" class="after-btn after-btn--retake">retake</button>
        <button id="btn-keep" class="after-btn after-btn--keep">keep</button>
      </div>
    </div>
  </div>

  <script src="tasks.js"></script>
  <script src="app.js"></script>
</body>
</html>
